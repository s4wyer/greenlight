<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Greenlight</title>
		<link rel="stylesheet" href="popup.css">
	</head>
	<body>
		<main class="panel">
			<h2>Greenlight</h2>

			<label class="label" for="linkInput">Product link</label>
			<div class="input-group">
				<input type="text" id="linkInput" class="input" placeholder="Paste Taobao, Weidian, or 1688 link...">
				<button id="convertBtn" class="button">Convert & Open</button>
			</div>

			<div id="result"></div>

			<div class="settings">
				<label class="toggle-label">
					<input type="checkbox" id="toggleAutoConvert">
					<span>Auto-convert links on page</span>
				</label>
				<label class="toggle-label">
					<input type="checkbox" id="toggleRightClick">
					<span>Enable right-click QC menu</span>
				</label>
			</div>
		</main>

		<script src="popup.js"></script>
	</body>
</html>
