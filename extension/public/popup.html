<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Greenlight</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      padding: 16px;
      margin: 0;
      background: #f9fafb;
    }
    h2 {
      font-size: 16px;
      margin-top: 0;
      color: #111827;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover {
      background-color: #2563eb;
    }
    #result {
      margin-top: 16px;
      font-size: 13px;
      word-break: break-all;
    }
    #result a {
      color: #2563eb;
      text-decoration: none;
    }
    #result a:hover {
      text-decoration: underline;
    }
    .error {
      color: #ef4444;
    }
    .settings {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #4b5563;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Mulebuy Converter</h2>
  <div class="input-group">
    <input type="text" id="linkInput" placeholder="Paste Taobao, Weidian, or 1688 link..." />
    <button id="convertBtn">Convert & Open</button>
  </div>
  <div id="result"></div>
  
  <div class="settings">
    <label class="toggle-label">
      <input type="checkbox" id="toggleAutoConvert" />
      <span>Auto-convert links on page</span>
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="toggleRightClick" />
      <span>Enable right-click QC menu</span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
